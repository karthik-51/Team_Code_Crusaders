# ============================================================================
# Approach summary (VERIFIED FROM src/scoring.py, src/retrieval.py, etc.)
# ============================================================================
methodology_summary: |
  End-to-end ranker orchestrated by redrob-ranker/rank.py that builds job and candidate
  representations, retrieves a relevant candidate pool, scores with recruiter-inspired
  signals, applies explicit honeypot filtering, and generates interpretable reasoning.

  Stage 1 (JD Parsing): Rule-based parsing of the job description into structured requirements
  and must-have/nice-to-have clusters using src/jd_parser.py.

  Stage 2 (Candidate Features): Candidate canonical text + structured features from
  src/candidate_features.py, including role fit, skills, career coherence, authenticity,
  hireability, and behavioral signals.

  Stage 3 (Hybrid Retrieval): Dense semantic retrieval using sentence-transformers
  all-MiniLM-L6-v2 embeddings plus BM25 lexical matching (0.6 cosine + 0.4 BM25) to
  retrieve the top 3,000 candidates.

  Stage 5 (Honeypot Detection): Explicit anti-honeypot rules in src/honeypot.py detect
  copied biographies, non-technical keyword stuffing, title/theme mismatch, and endorsement
  / assessment gaps; penalties and a skill-trust multiplier reduce noisy candidates.

  Stage 6 (Reasoning): Template-based reasoning generation in src/reasoning.py produces
  recruiter-style summary text for each shortlisted candidate without an LLM at runtime.

  Scoring Formula: total_score = 0.12×semantic_fit + 0.38×career_trajectory + 0.12×skill_depth_trust
  + 0.18×behavioral_hireability − 0.10×inconsistency_penalty − 0.15×keyword_stuffing_penalty
  − 0.20×honeypot_penalty.

  Key design: Career trajectory is the largest positive signal, with all components clamped
  to [0,1]. CPU-only when the local all-MiniLM-L6-v2 model cache is available, with no
  network calls during ranking.

